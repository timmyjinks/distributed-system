apiVersion: v1
kind: Service
metadata:
  labels:
    app: image
  name: image-service
  namespace: distributed-system
spec:
  ports:
    - port: 80
  selector:
    app: image
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: image
  name: image
  namespace: distributed-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image
  template:
    metadata:
      labels:
        app: image
        namespace: distributed-system
    spec:
      containers:
        - name: image
          image: timmijinks/ds-image:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: "500Mi"
              cpu: "50m"
          ports:
            - containerPort: 80
