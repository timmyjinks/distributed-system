apiVersion: v1
kind: Service
metadata:
  labels:
    app: prometheus
  name: prometheus-service
  namespace: distributed-system
spec:
  ports:
    - port: 9090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prometheus
  name: prometheus
  namespace: distributed-system
spec:
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      name: prometheus
      namespace: distributed-system
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "500Mi"
              cpu: "50m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              readOnly: true
          ports:
            - containerPort: 9090
      volumes:
        - name: config
          hostPath:
            path: /home/timmy/Workspace/personal/distributed-system/prometheus.yml
            type: File
